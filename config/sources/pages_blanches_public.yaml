slug: pages_blanches_seed
name: pagesjaunes.fr/pagesblanches (France seed)
scraper: pages_blanches_public
enabled: false
respect_robots: true
start_urls:
- https://www.pagesjaunes.fr/pagesblanches
selectors:
  card: li.bi-bloc, li.bi-pro, article.bi-bloc
  name: h2 a, h3 a
  city: .adresse, .bi-address
  phone: strong.num, .number-contact, [data-phone]
  website: a.btn-site
  next_page: a.pagination-next, a[rel='next']
params:
  max_pages: 1
  query_url_template: https://www.pagesjaunes.fr/pagesblanches/recherche?quoiqui={name}&ou={city}
  seed_names_file: config/geo/france_common_surnames.txt
  cities_file: config/geo/france_prefectures.txt
  max_queries: 120
  privacy_mode: particulier_conforme
  privacy_drop_person_records: false
  privacy_drop_private_email_records: false
  privacy_redact_name: false
  privacy_redact_contact: true
  privacy_redact_address: true
  privacy_redact_page_url: true
  note: 'Mode national particuliers (seeds noms+villes). A activer uniquement si acces autorise (anti-bot/CGU).'
  privacy_profile: b2c_etendu
  privacy_sanitize_description: true
