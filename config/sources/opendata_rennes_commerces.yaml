slug: opendata_rennes_commerces
name: data.rennesmetropole.fr/commerces
scraper: open_data_json
enabled: true
respect_robots: true
start_urls:
- https://data.rennesmetropole.fr/api/explore/v2.1/catalog/datasets/commerces-chavagne-challenge-data/records
selectors:
  name: name
  city: com_name
  address: adresse
  category: categorie
  description: status_name
params:
  stable_pack: true
  items_path: results
  pagination_mode: offset
  page_size: 100
  max_pages: 10
  limit_param: limit
  offset_param: offset
  timeout_seconds: 45
  max_items_per_url: 2000
  privacy_mode: particulier_conforme
  privacy_drop_person_records: true
  privacy_drop_private_email_records: true
  privacy_redact_contact: true
  privacy_redact_address: true
  privacy_redact_page_url: true
  privacy_sanitize_description: true
  note: Open data Rennes Metropole, source publique sans authentification.
  privacy_profile: b2c_conforme
  privacy_redact_name: true
