slug: opendata_angers_associations
name: data.angers.fr/annuaire-associations
scraper: open_data_json
enabled: true
respect_robots: true
start_urls:
- https://data.angers.fr/api/explore/v2.1/catalog/datasets/annuaire_asso_angers/records
selectors:
  name: nom_long
  city: ville
  website: site_web
  phone: telephone_1
  address: adresse
  category: activite
  description: objet
params:
  stable_pack: true
  items_path: results
  pagination_mode: offset
  page_size: 100
  max_pages: 20
  limit_param: limit
  offset_param: offset
  timeout_seconds: 45
  max_items_per_url: 3000
  privacy_mode: particulier_conforme
  privacy_profile: b2c_conforme
  note: Open data Angers. Donnees publiques sans authentification.
  privacy_drop_person_records: true
  privacy_drop_private_email_records: true
  privacy_redact_name: true
  privacy_redact_contact: true
  privacy_redact_address: true
  privacy_redact_page_url: true
  privacy_sanitize_description: true
