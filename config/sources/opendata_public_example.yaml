slug: opendata_public_example
name: open data template
scraper: open_data_json
enabled: false
respect_robots: true
start_urls:
- https://example.com/public-open-data.json
selectors:
  name: name
  city: city
  phone: phone
  website: website
  address: address
  category: category
  description: description
params:
  items_path: results
  timeout_seconds: 30
  max_items_per_url: 2000
  note: Replace start_urls and field paths with your target open-data dataset.
  privacy_mode: particulier_conforme
  privacy_profile: b2c_conforme
  privacy_drop_person_records: true
  privacy_drop_private_email_records: true
  privacy_redact_name: true
  privacy_redact_contact: true
  privacy_redact_address: true
  privacy_redact_page_url: true
  privacy_sanitize_description: true
