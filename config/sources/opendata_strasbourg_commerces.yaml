slug: opendata_strasbourg_commerces
name: data.strasbourg.eu/commerces-ouverts
scraper: open_data_json
enabled: true
respect_robots: true
start_urls:
- https://data.strasbourg.eu/api/explore/v2.1/catalog/datasets/covid-19-confinement-2-commerces-ouverts-autorises-a-maintenir-une-activite/records
selectors:
  name: nometablissement
  city: ad_ville
  website: contact_web
  phone: ndeg_de_telephone
  address: ad_numnomrue
  category: secteuractivite
  description: info_description
params:
  stable_pack: true
  items_path: results
  pagination_mode: offset
  page_size: 100
  max_pages: 20
  limit_param: limit
  offset_param: offset
  timeout_seconds: 45
  max_items_per_url: 3000
  privacy_mode: particulier_conforme
  privacy_profile: b2c_conforme
  note: Open data Strasbourg. Donnees publiques sans authentification.
  privacy_drop_person_records: true
  privacy_drop_private_email_records: true
  privacy_redact_name: true
  privacy_redact_contact: true
  privacy_redact_address: true
  privacy_redact_page_url: true
  privacy_sanitize_description: true
